name: playground-smoke

# Manual + nightly only — never on PRs, so normal CI stays fast.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false          # a 19 failure must not mask the 18 result
      matrix:
        odoo_image: ["odoo:18", "odoo:19"]
    name: smoke (${{ matrix.odoo_image }})
    env:
      ODOO_IMAGE: ${{ matrix.odoo_image }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install odoo-pulse
        run: pip install -e .
      - name: Run playground smoke
        run: ./scripts/playground_smoke.sh
