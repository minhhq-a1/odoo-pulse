name: release

# Build and publish to PyPI when a version tag is pushed.
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token is stored.
#
# One-time setup (owner, on PyPI):
#   PyPI > your project > Publishing > Add a trusted publisher (GitHub Actions)
#     Owner:            minhhq-a1
#     Repository:       odoo-pulse
#     Workflow name:    release.yml
#     Environment name: pypi
#
# Then: `git tag v1.0.0 && git push origin v1.0.0` publishes automatically.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Don't hard-fail if a build's files are already on PyPI (e.g. a tag
          # whose version matches an already-published release) — skip them.
          skip-existing: true
